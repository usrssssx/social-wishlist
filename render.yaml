databases:
  - name: swl-db
    databaseName: wishlist
    user: wishlist
    plan: basic-256mb

services:
  - type: web
    name: swl-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swl-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: MIN_CONTRIBUTION_AMOUNT
        value: 100

  - type: web
    name: swl-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
