databases:
  - name: swl-db
    databaseName: wishlist
    user: wishlist
    plan: basic-256mb

services:
  - type: web
    name: swl-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swl-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: MIN_CONTRIBUTION_AMOUNT
        value: 100
      - key: CAPTCHA_PROVIDER
        value: turnstile
      - key: CAPTCHA_SECRET_KEY
        sync: false
      - key: CAPTCHA_VERIFY_URL
        value: https://challenges.cloudflare.com/turnstile/v0/siteverify
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: swl-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
