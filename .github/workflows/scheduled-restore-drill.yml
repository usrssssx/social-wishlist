name: Scheduled Restore Drill

on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

jobs:
  restore_drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run restore drill
        env:
          PGPASSWORD: postgres
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
        run: |
          chmod +x scripts/db_backup.sh scripts/db_restore.sh scripts/restore_drill_local.sh
          ./scripts/restore_drill_local.sh
