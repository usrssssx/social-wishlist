name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: social_wishlist_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d social_wishlist_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/social_wishlist_ci
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run database migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Run backend checks
        run: |
          cd backend
          python -m compileall app
          pytest -q

      - name: Run backend e2e gate
        run: |
          cd backend
          pytest -q tests/test_e2e_public_realtime_flow.py tests/test_e2e_account_deletion.py

  restore_drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Restore drill
        env:
          PGPASSWORD: postgres
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
        run: |
          chmod +x scripts/db_backup.sh scripts/db_restore.sh scripts/restore_drill_local.sh
          ./scripts/restore_drill_local.sh

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  gate:
    runs-on: ubuntu-latest
    needs: [backend, frontend, restore_drill]
    steps:
      - name: Release gate passed
        run: echo "All release-gate checks are green"
