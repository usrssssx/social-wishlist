services:
  db:
    image: postgres:16-alpine
    container_name: swl-postgres
    environment:
      POSTGRES_USER: wishlist
      POSTGRES_PASSWORD: wishlist
      POSTGRES_DB: wishlist
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlist -d wishlist"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    container_name: swl-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://wishlist:wishlist@db:5432/wishlist
      JWT_SECRET: super-secret-change-me
      CORS_ORIGINS: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      ENVIRONMENT: development
      MIN_CONTRIBUTION_AMOUNT: 100
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    container_name: swl-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pgdata:
